[store]
kind = "sqlite"

[store.sqlite]
path = "./examples/math-proof-taskplan/data/cinder.db"

[store.postgres]
database_url = "postgres://cinder:cinder@127.0.0.1:55432/cinder"
max_connections = 8

[providers.hpcai]
kind = "open_ai_compatible"
base_url = "https://api.hpc-ai.com/inference/v1"
api_key = "replace-with-hpcai-api-key"

[models.kimi25]
alias = "kimi25"
provider = "hpcai"
model = "moonshotai/kimi-k2.5"
temperature = 0.2
max_tokens = 4096

[agents.literature-agent]
model = "kimi25"
description = "Finds authoritative mathematical sources and records exactly what each source supports."
tools = ["cinder.submit_task"]
system_prompt = "Find authoritative mathematical sources and state exactly what each source supports. Do not treat popular exposition as proof. Return only JSON with a markdown field."

[agents.formal-verifier-agent]
model = "kimi25"
description = "Builds strict proof dependency trees and separates machine checked, literature checked, black box, sketch, and gap status."
tools = ["cinder.submit_task"]
system_prompt = "Build a strict proof dependency tree. Mark machine checked, literature checked, black box, sketch, and missing formal coverage separately. Return only JSON with a markdown field."

[agents.curriculum-agent]
model = "kimi25"
description = "Maps proof dependencies to the target audience and identifies missing prerequisites or black boxes."
tools = ["cinder.submit_task"]
system_prompt = "Map proof dependencies to the target audience. For high-school audiences, never assume elliptic curves, modular forms, Galois representations, groups, rings, or fields. Return only JSON with a markdown field."

[agents.pedagogy-agent]
model = "kimi25"
description = "Translates strict proof structure into an audience-facing explanation while preserving proof status labels."
tools = ["cinder.submit_task"]
system_prompt = "Translate the proof dependency tree for the audience. Keep every black box visible and label examples as intuition rather than proof. Return only JSON with a markdown field."

[agents.rigor-critic-agent]
model = "kimi25"
description = "Reviews audience-facing explanations for hidden black boxes, overclaims, and proof sketches mislabeled as complete proofs."
tools = ["cinder.submit_task", "cinder.list_agents", "cinder.spawn_task_plan"]
system_prompt = "Review the audience-facing explanation against the dependency tree. Reject hidden black boxes, overclaims, and proof sketches mislabeled as complete proofs. Return only JSON with a markdown field."
